    #     location /health {
    #         limit_req zone=health burst=10 nodelay;
    #         proxy_pass http://api;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #     }
    #
    #     location / {
    #         limit_req zone=api burst=10 nodelay;
    #         proxy_pass http://api;
    #         proxy_set_header Host $host;
